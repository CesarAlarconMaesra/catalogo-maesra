<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Catálogo MAESRA Febrero 2026</title>

<link rel="stylesheet" href="style.css" />
<link rel="manifest" href="manifest.json">
<link rel="icon" href="img/icon-192.png">

<meta name="theme-color" content="#1f2937">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-FMS994TZZN"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-FMS994TZZN');
</script>

</head>

<body>

<div id="toastExito" class="toast">
✅ Pedido enviado correctamente
</div>

<div id="infoLista"></div>

<header class="header">

<div class="logo-area">

<img src="img/MAESRA.jpg" class="logo">

<div class="titulo">
<h1>Catálogo MAESRA</h1>
<p>Promociones y catálogo digital</p>
<h3>Al usar esta aplicación acepta el registro de actividad con fines estadísticos</h3>
</div>

</div>

<div class="header-controles">

<button id="btnPrecio">Cambiar Lista</button>
<button id="cerrarCarrito">Cerrar</button>
<button id="btnCarrito" class="carrito-btn">
🛒
<span id="contadorCarrito" class="contador-carrito">0</span>
</button>

<div class="total-header">
$<span id="totalHeader">0.00</span>
</div>

</div>

</header>

<div class="buscador-area">
<input type="text" id="buscador" placeholder="Buscar producto, marca o código..." />
</div>

<h2>🔥 Promociones</h2>
<div class="carrusel">
  <div class="carrusel-track" id="promoTrack"></div>
</div>

<h2>⭐ Más vendidos</h2>
<div class="carrusel">
  <div class="carrusel-track" id="topProductos"></div>
</div>
<main id="listaProductos"></main>

<!-- Modal detalle -->

<div id="modal" class="modal oculto">

<div class="modal-content">

<span id="cerrar">&times;</span>

<img id="dImagen" class="detalle-img"/>

<h2 id="dNombre"></h2>

<p id="dCodigo"></p>
<p id="dMarca"></p>
<p id="dUnidad"></p>
<p id="dMaster"></p>
<p id="dInner"></p>

<p id="dPrecio"></p>

<button id="btnAgregarCarrito" class="btn-agregar">
🛒 Agregar al carrito
</button>

</div>
</div>

<!-- Modal carrito -->

<div id="modalCarrito" class="modal oculto">

<div class="modal-content">

<span onclick="cerrarCarrito()">&times;</span>

<h2>🛒 Carrito</h2>

<div id="contenidoCarrito"></div>

<h3 id="totalCarrito"></h3>

<button onclick="vaciarCarrito()" class="btn-vaciar">
🗑 Vaciar carrito
</button>

<button onclick="enviarWhatsApp()" class="btn-enviar">
📲 Enviar Pedido por WhatsApp
</button>

<button onclick="cerrarCarrito()">Cerrar</button>
<button onclick="vaciarCarrito()">Vaciar carrito</button>

</div>
</div>

<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js")
}
</script>

<script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getFirestore, collection, addDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBN2oKqeUBcaXKZ9PmNzcMlymJZbkBn0vs",
authDomain: "catalogo-maesra.firebaseapp.com",
projectId: "catalogo-maesra",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.addDoc = addDoc;
window.collection = collection;

</script>

<script src="app.js"></script>

</body>
</html>
