<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h2>Catálogo de Productos</h2>

    <input type="text" id="buscador" placeholder="Buscar por descripción, código o marca">

    <div class="carritoIcono" onclick="abrirModalCarrito()">
        🛒
        <span id="contadorCarrito">0</span>
    </div>
</header>

<h3>Promociones</h3>
<section id="contenedorPromociones" class="contenedorProductos"></section>

<h3>Más Vendidos</h3>
<section id="contenedorMasVendidos" class="contenedorProductos"></section>

<h3>Productos</h3>
<section id="contenedorProductos" class="contenedorProductos"></section>


<!-- MODAL DETALLE -->
<div id="modalDetalle" class="modal">
    <div class="modalContenido">
        <span class="cerrar" onclick="cerrarModalDetalle()">&times;</span>
        <img id="detalleImagen">
        <h3 id="detalleDescripcion"></h3>
        <p id="detalleMarca"></p>
        <p id="detalleCodigo"></p>
        <p id="detallePrecio"></p>
        <button id="btnAgregarDetalle">Agregar al carrito</button>
    </div>
</div>

<!-- MODAL CARRITO -->
<div id="modalCarrito" class="modal">
    <div class="modalContenido carritoModal">
        <span class="cerrar" onclick="cerrarModalCarrito()">&times;</span>
        <h2>🛒 Carrito</h2>
        <div id="carritoItems"></div>
        <h3>Total: $<span id="carritoTotal">0.00</span></h3>
        <button onclick="vaciarCarrito()">Vaciar carrito</button>
        <button onclick="enviarWhatsApp()">Enviar por WhatsApp</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
